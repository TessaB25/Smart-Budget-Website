<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Budget Calculator</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family: Arial, sans-serif;
  text-align: center;
  margin: 0;
  overflow-y: auto; /* Allows vertical scrolling */
  padding-bottom: 50px; /* space so bottom items aren't cut off */
}

.calculator-container{
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
  background: rgba(255,165,0,0.9);
  border-radius: 12px;
}

input{
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}

button{
  padding: 10px 20px;
  margin-top: 10px;
  background: white;
  color: orange;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover{
  background:#ffe0b2;
}

/* Fix chart display */
#budgetChart{
  margin-top:20px;
  max-width:100%;
  height:350px;
}

.home-btn{
  display:block;
  margin-top:30px;
  text-decoration:none;
  font-weight:bold;
  font-size:18px;
}

</style>
</head>

<body>

<h1>💰 Smart Budget Calculator</h1>

<div class="calculator-container">

<input type="number" id="income" placeholder="Total Income">

<input type="number" id="tithe" placeholder="Tithes & Offering">

<input type="number" id="charity" placeholder="Charities">

<input type="number" id="savingsInput" placeholder="Monthly Savings">

<input type="number" id="rent" placeholder="Rent / Mortgage">

<input type="number" id="water" placeholder="Water">

<input type="number" id="gas" placeholder="Gas">

<input type="number" id="sewer" placeholder="Sewer">

<input type="number" id="food" placeholder="Food">

<input type="number" id="transport" placeholder="Transportation">

<button onclick="updateChart()">Calculate</button>

<canvas id="budgetChart"></canvas>

</div>

<script>

let chart;

function updateChart(){

const income = Number(document.getElementById("income").value) || 0;

const tithe = Number(document.getElementById("tithe").value) || 0;
const charity = Number(document.getElementById("charity").value) || 0;
const savingsInput = Number(document.getElementById("savingsInput").value) || 0;
const rent = Number(document.getElementById("rent").value) || 0;
const water = Number(document.getElementById("water").value) || 0;
const gas = Number(document.getElementById("gas").value) || 0;
const sewer = Number(document.getElementById("sewer").value) || 0;
const food = Number(document.getElementById("food").value) || 0;
const transport = Number(document.getElementById("transport").value) || 0;

/* Add ALL expenses */

const totalExpenses =
tithe +
charity +
savingsInput +
rent +
water +
gas +
sewer +
food +
transport;

/* Calculate money left */

const moneyLeft = income - totalExpenses;

const data = {
labels:[
"Tithe",
"Charity",
"Savings",
"Rent",
"Water",
"Gas",
"Sewer",
"Food",
"Transport",
"Money Left"
],
datasets:[{
data:[
tithe,
charity,
savingsInput,
rent,
water,
gas,
sewer,
food,
transport,
moneyLeft
]
}]
};

const config={
type:"pie",
data:data
};

if(chart) chart.destroy();

chart = new Chart(
document.getElementById("budgetChart"),
config
);

}

</script>

<a href="index.html" class="home-btn">⬅ Back to Home</a>

</body>
</html>
