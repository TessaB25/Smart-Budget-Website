<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Budget Calculator</title>

<link rel="stylesheet" href="style.css">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  font-family: Arial, sans-serif;
  text-align: center;
}

.calculator-container{
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
  background: rgba(255,165,0,0.9);
  border-radius: 12px;
}

input{
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: none;
}

button{
  padding: 10px 20px;
  margin-top: 10px;
  background: white;
  color: orange;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover{
  background:#ffe0b2;
}

/* Fix chart display */
#budgetChart{
  margin-top:20px;
  max-width:100%;
  height:300px;
}

.home-btn{
  display:block;
  margin-top:25px;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>

<body>

<h1>💰 Smart Budget Calculator</h1>

<div class="calculator-container">

<input type="number" id="income" placeholder="Total Income">

<input type="number" id="tithe" placeholder="Tithes & Offering">

<input type="number" id="charity" placeholder="Charities">

<input type="number" id="savingsInput" placeholder="Monthly Savings">

<input type="number" id="rent" placeholder="Rent / Mortgage">

<input type="number" id="water" placeholder="Water">

<input type="number" id="gas" placeholder="Gas">

<input type="number" id="sewer" placeholder="Sewer">

<input type="number" id="food" placeholder="Food">

<input type="number" id="transport" placeholder="Transportation">

<button onclick="updateChart()">Calculate</button>

<canvas id="budgetChart"></canvas>

</div>

<script>

let chart;

function updateChart(){

const income = Number(document.getElementById("income").value);
const rent = Number(document.getElementById("rent").value);
const food = Number(document.getElementById("food").value);
const transport = Number(document.getElementById("transport").value);

const expenses = rent + food + transport;
const savings = income - expenses;

const data = {
labels:["Rent","Food","Transport","Savings"],
datasets:[{
data:[rent,food,transport,savings]
}]
};

const config={
type:"pie",
data:data
};

if(chart) chart.destroy();

chart = new Chart(
document.getElementById("budgetChart"),
config
);

}

</script>

<a href="index.html" class="home-btn">⬅ Back to Home</a>

</body>
</html>
